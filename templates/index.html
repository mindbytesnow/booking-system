<!DOCTYPE html>
<html>
<head>
    <title>Booking System</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .slots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }

        .slot {
            padding: 10px;
            background: #eee;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .slot.active {
            background: #4CAF50;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .msg {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Book Appointment</h1>

    <form method="POST" action="/book">

        <input name="name" placeholder="Your Name" required>
        <input name="email" placeholder="Your Email" required>

        <input type="date" name="date" id="date" required>

        <div class="slots" id="slots">
            <button type="button" class="slot">10:00 AM</button>
            <button type="button" class="slot">11:00 AM</button>
            <button type="button" class="slot">12:00 PM</button>
            <button type="button" class="slot">2:00 PM</button>
            <button type="button" class="slot">3:00 PM</button>
            <button type="button" class="slot">4:00 PM</button>
        </div>

        <input type="hidden" name="time" id="selectedTime">

        <button type="submit">Book Now</button>

        <div class="msg" id="msg"></div>
    </form>
</div>

<script>
const slots = document.querySelectorAll(".slot");
const selectedTime = document.getElementById("selectedTime");
const msg = document.getElementById("msg");

slots.forEach(slot => {
    slot.addEventListener("click", () => {

        slots.forEach(s => s.classList.remove("active"));

        slot.classList.add("active");

        selectedTime.value = slot.innerText;

        msg.innerText = "Selected: " + slot.innerText;
    });
});
</script>

</body>
</html>

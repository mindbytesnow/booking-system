<!DOCTYPE html>
<html>
<head>
    <title>Booking System</title>
<p style="text-align:center; color:#777; font-size:13px;">
    Choose a date and time to book your appointment
</p>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: linear-gradient(135deg, #eef2f7, #f8fafc);
    display: flex;
    justify-content: center;
    padding: 50px;
    color: #111;
}

/* MAIN CARD */
.card {
    background: white;
    padding: 30px;
    border-radius: 18px;
    width: 460px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.08);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-2px);
}

/* TITLE */
h1 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 6px;
}

p {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 18px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 13px;
    margin: 8px 0;
    border: 1px solid #e6e6e6;
    border-radius: 12px;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #111;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

/* CALENDAR */
#calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin: 15px 0;
}

.day {
    padding: 11px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    background: #f4f6f8;
    transition: 0.2s ease;
    user-select: none;
}

.day:hover {
    background: #e8ecf1;
    transform: scale(1.05);
}

.day.selected {
    background: #111;
    color: white;
    transform: scale(1.05);
}

/* SLOTS */
.slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.slot {
    padding: 13px;
    border-radius: 12px;
    border: 1px solid #e8e8e8;
    background: #fafafa;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.slot:hover {
    border-color: #111;
    transform: translateY(-1px);
}

.slot.active {
    background: #111;
    color: white;
    border-color: #111;
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    background: #111;
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 18px;
    font-size: 15px;
    transition: 0.2s;
}

button:hover {
    background: #000;
    transform: translateY(-1px);
}

/* MESSAGE */
.msg {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #666;
    min-height: 18px;
}
</style>

</head>

<body>

<div class="card">

    <h1>Book Appointment</h1>
    <p>Choose a date and time — instant confirmation</p>
    <form method="POST" action="/book">

        <input name="name" placeholder="Your Name" required>
        <input name="email" placeholder="Your Email" required>

        <label>Select Date</label>
        <div id="calendar"></div>

        <input type="hidden" name="date" id="date" required>

        <div class="slots">
            <button type="button" class="slot">10:00 AM</button>
            <button type="button" class="slot">11:00 AM</button>
            <button type="button" class="slot">12:00 PM</button>
            <button type="button" class="slot">2:00 PM</button>
            <button type="button" class="slot">3:00 PM</button>
            <button type="button" class="slot">4:00 PM</button>
        </div>

        <input type="hidden" name="time" id="selectedTime" required>

        <button type="submit">Book Now</button>

        <div class="msg" id="msg"></div>
    </form>
</div>

<script>
const calendar = document.getElementById("calendar");
const dateInput = document.getElementById("date");
const slots = document.querySelectorAll(".slot");
const selectedTime = document.getElementById("selectedTime");
const msg = document.getElementById("msg");

let selectedDate = null;

/* 📅 BUILD MONTH CALENDAR */
function generateCalendar() {
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    calendar.innerHTML = "";

    // empty spaces before month starts
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        calendar.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const div = document.createElement("div");
        div.className = "day";
        div.innerText = day;

        div.addEventListener("click", () => {

            document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
            div.classList.add("selected");

            selectedDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

            dateInput.value = selectedDate;

            loadAvailability(selectedDate);
        });

        calendar.appendChild(div);
    }
}

/* 🔥 RESET SLOTS */
function resetSlots() {
    slots.forEach(slot => {
        slot.disabled = false;
        slot.classList.remove("active");
        slot.style.opacity = "1";
    });
}

/* 📡 GET AVAILABLE SLOTS FROM BACKEND */
async function loadAvailability(date) {
    if (!date) return;

    const res = await fetch(`/available?date=${date}`);
    const data = await res.json();

    resetSlots();

    slots.forEach(slot => {
        if (data.includes(slot.innerText)) {
            slot.disabled = true;
            slot.style.opacity = "0.3";
        }
    });
}

/* ⏰ SLOT CLICK */
slots.forEach(slot => {
    slot.addEventListener("click", () => {

        if (slot.disabled) return;

        slots.forEach(s => s.classList.remove("active"));

        slot.classList.add("active");

        selectedTime.value = slot.innerText;

        msg.innerText = "Selected: " + selectedDate + " at " + slot.innerText;
    });
});

/* INIT */
generateCalendar();
</script>

</body>
</html>

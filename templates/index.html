<!DOCTYPE html>
<html>
<head>
    <title>Booking System</title>
<p style="text-align:center; color:#777; font-size:13px;">
    Choose a date and time to book your appointment
</p>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    padding: 40px;
    color: #111;
}

.card {
    background: white;
    padding: 28px;
    border-radius: 16px;
    width: 440px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

/* HEADER */
h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
}

input:focus {
    border-color: #000;
}

/* CALENDAR */
#calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin: 12px 0;
}

.day {
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    background: #f5f6f8;
    transition: 0.2s;
}

.day:hover {
    background: #e8eaee;
}

.day.selected {
    background: #111;
    color: white;
}

/* SLOTS */
.slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
}

.slot {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e5e5;
    background: #fafafa;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.slot:hover {
    border-color: #111;
}

.slot.active {
    background: #111;
    color: white;
    border-color: #111;
}

button {
    width: 100%;
    padding: 14px;
    background: #111;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 16px;
    font-size: 14px;
}

button:hover {
    background: #000;
}

/* MESSAGE */
.msg {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #666;
}

/* LABEL */
label {
    font-size: 13px;
    color: #666;
}
</style>

</head>

<body>

<div class="card">

    <h1>Book Appointment</h1>

    <form method="POST" action="/book">

        <input name="name" placeholder="Your Name" required>
        <input name="email" placeholder="Your Email" required>

        <label>Select Date</label>
        <div id="calendar"></div>

        <input type="hidden" name="date" id="date" required>

        <div class="slots">
            <button type="button" class="slot">10:00 AM</button>
            <button type="button" class="slot">11:00 AM</button>
            <button type="button" class="slot">12:00 PM</button>
            <button type="button" class="slot">2:00 PM</button>
            <button type="button" class="slot">3:00 PM</button>
            <button type="button" class="slot">4:00 PM</button>
        </div>

        <input type="hidden" name="time" id="selectedTime" required>

        <button type="submit">Book Now</button>

        <div class="msg" id="msg"></div>
    </form>
</div>

<script>
const calendar = document.getElementById("calendar");
const dateInput = document.getElementById("date");
const slots = document.querySelectorAll(".slot");
const selectedTime = document.getElementById("selectedTime");
const msg = document.getElementById("msg");

let selectedDate = null;

/* 📅 BUILD MONTH CALENDAR */
function generateCalendar() {
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    calendar.innerHTML = "";

    // empty spaces before month starts
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        calendar.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const div = document.createElement("div");
        div.className = "day";
        div.innerText = day;

        div.addEventListener("click", () => {

            document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
            div.classList.add("selected");

            selectedDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

            dateInput.value = selectedDate;

            loadAvailability(selectedDate);
        });

        calendar.appendChild(div);
    }
}

/* 🔥 RESET SLOTS */
function resetSlots() {
    slots.forEach(slot => {
        slot.disabled = false;
        slot.classList.remove("active");
        slot.style.opacity = "1";
    });
}

/* 📡 GET AVAILABLE SLOTS FROM BACKEND */
async function loadAvailability(date) {
    if (!date) return;

    const res = await fetch(`/available?date=${date}`);
    const data = await res.json();

    resetSlots();

    slots.forEach(slot => {
        if (data.includes(slot.innerText)) {
            slot.disabled = true;
            slot.style.opacity = "0.3";
        }
    });
}

/* ⏰ SLOT CLICK */
slots.forEach(slot => {
    slot.addEventListener("click", () => {

        if (slot.disabled) return;

        slots.forEach(s => s.classList.remove("active"));

        slot.classList.add("active");

        selectedTime.value = slot.innerText;

        msg.innerText = "Selected: " + selectedDate + " at " + slot.innerText;
    });
});

/* INIT */
generateCalendar();
</script>

</body>
</html>
